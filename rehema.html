<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr-Mini-Bot | </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: #0b0e14;
            --panel: rgba(19, 23, 31, 0.8);
            --accent: #00d2ff;
            --danger: #ff3b3b;
            --success: #00ff88;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(0, 210, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding: clamp(10px, 4vw, 30px); overflow-x: hidden; position: relative; }

        /* TECHY BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* 3-SECOND FAST RING LOADER */
        #boot-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .ring-container { position: relative; width: 80px; height: 80px; margin-bottom: 20px; }
        .ring {
            position: absolute; inset: 0; border: 2px solid transparent;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .ring-inner {
            position: absolute; inset: 10px; border: 2px solid transparent;
            border-bottom-color: var(--success); border-radius: 50%;
            animation: spin-reverse 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        .boot-text { font-family: 'JetBrains Mono'; font-size: 0.7rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; animation: pulse 1s infinite; }

        /* NOTIFICATIONS (BULLETS) */
        #notif-container { position: fixed; bottom: 20px; right: 20px; z-index: 10001; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--accent);
            padding: 14px 22px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;
            backdrop-filter: blur(15px); color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            display: flex; align-items: center; gap: 10px; pointer-events: auto;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }

        /* SEARCH BAR */
        .search-container {
            position: relative; margin-bottom: 20px;
        }
        .search-input {
            width: 100%; padding: 16px 20px 16px 50px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 18px; color: #fff;
            font-size: 0.9rem; outline: none; transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .clear-search { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-dim); cursor: pointer; display: none; }

        /* CONTENT */
        .container { 
            max-width: 1200px; margin: 0 auto; opacity: 0; 
            transform: translateY(10px); transition: 0.6s ease; z-index: 1;
        }
        .container.visible { opacity: 1; transform: translateY(0); }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 25px; background: var(--panel); border-radius: 24px;
            border: 1px solid var(--border); margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        .brand-info h1 { font-size: clamp(1rem, 5vw, 1.4rem); font-weight: 800; color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); transition: 0.3s; }
        .stat-box:hover { border-color: var(--accent); transform: scale(1.02); }
        .stat-box .label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-box .value { font-size: 1.8rem; font-weight: 800; font-family: 'JetBrains Mono'; margin-top: 5px; }

        .control-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .btn {
            padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: #fff; font-weight: 700;
            font-size: 0.75rem; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; transition: 0.3s ease;
        }
        .btn:hover { background: var(--accent); color: #000; transform: translateY(-3px); }
        .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--panel); padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: var(--text-dim); font-weight: 700; font-size: 0.75rem;
            cursor: pointer; border-radius: 10px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active { color: #000; background: var(--accent); }

        .node-list { display: grid; gap: 15px; }
        .node-card {
            background: var(--panel); border-radius: 22px; border: 1px solid var(--border);
            padding: 20px; backdrop-filter: blur(10px); animation: cardIn 0.4s ease backwards;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } }

        .status-indicator { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; font-weight: 800; }
        .beep-green { width: 10px; height: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); position: relative; }
        .beep-green::after { content:''; position: absolute; inset: -4px; border: 1px solid var(--success); border-radius: 50%; animation: sonar 2s infinite; }
        .beep-offline { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 10px var(--danger); }

        @keyframes sonar { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 11000; padding: 20px; }
        .modal-content { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 28px; text-align: center; max-width: 400px; width: 100%; }

        @media (min-width: 768px) { .node-list { grid-template-columns: repeat(2, 1fr); } .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="boot-screen">
    <div class="ring-container">
        <div class="ring"></div>
        <div class="ring-inner"></div>
    </div>
    <div class="boot-text">System Loading</div>
</div>

<div id="notif-container"></div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--danger)">SYSTEM CONFIRM</h2>
        <p id="modalText" style="margin: 20px 0; color: var(--text-dim);">Proceed with delete?</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
            <button class="btn" onclick="closeModal()">CANCEL</button>
            <button id="modalConfirmBtn" class="btn btn-danger">DELETE</button>
        </div>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <div class="brand-info">
            <h1>DR-MINI <span style="font-weight:300; opacity: 0.6;">Ultra</span></h1>
            <p style="font-size: 0.6rem; color: var(--text-dim); letter-spacing: 2px;"><i class="fas fa-microchip"></i> ADMINSYSTEM V1.1.0</p>
        </div>
        <div style="color:var(--success); font-size:0.75rem; font-weight:800; display: flex; align-items: center; gap: 8px;">
            <div class="beep-green" style="width: 8px; height: 8px;"></div> SECURE
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-box"><span class="label">Live Nodes</span><div class="value" id="activeCount" style="color:var(--success);">0</div></div>
        <div class="stat-box"><span class="label">Total Number</span><div class="value" id="totalSessions">0</div></div>
        <div class="stat-box"><span class="label">Latency</span><div class="value" id="pingVal" style="color:var(--accent);">--</div></div>
        <div class="stat-box"><span class="label">Time</span><div class="value" id="clock" style="font-size:1.1rem; margin-top:12px;">00:00:00</div></div>
    </div>

    <div class="control-bar">
        <button class="btn" onclick="refreshAll(true)"><i class="fas fa-sync-alt"></i> REFRESH</button>
        <button class="btn" onclick="connectAll()"><i class="fas fa-plug"></i> BOOT ALL</button>
        <button class="btn" onclick="rebootOffline()"><i class="fas fa-power-off"></i> BOOT ALL OFFLINE NODES</button>
        <button class="btn btn-danger" onclick="askWipeOffline()"><i class="fas fa-trash-alt"></i> DELETE ALL OFFLINE NODES</button>
        <button class="btn" onclick="reconnect()"><i class="fas fa-redo"></i> RELOG</button>
        <button class="btn btn-danger" onclick="askWipe()"><i class="fas fa-skull"></i> PURGE ALL</button>
    </div>

    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="nodeSearch" class="search-input" placeholder="Search node number..." oninput="handleSearch(this.value)">
        <i class="fas fa-times clear-search" id="clearSearch" onclick="clearSearch()"></i>
    </div>

    <div class="filter-tabs">
        <button id="tabAll" class="tab-btn active" onclick="switchTab('active')">
            ACTIVE <span id="countAll" style="background:rgba(0, 255, 136, 0.1); color:var(--success); padding:2px 8px; border-radius:6px; font-size:0.65rem;">0</span>
        </button>
        <button id="tabOffline" class="tab-btn" onclick="switchTab('offline')">
            OFFLINE <span id="countOffline" style="background:rgba(255, 59, 59, 0.1); color:var(--danger); padding:2px 8px; border-radius:6px; font-size:0.65rem;">0</span>
        </button>
    </div>

    <div id="nodeList" class="node-list"></div>
</div>

<script>
const API_URL = 'https://dr-mini-md-new-4bab55f00cdc.herokuapp.com/code';
let currentTab = 'active'; // Changed default to active
let sessionData = [];
let activeNumbers = [];
let searchQuery = '';

// --- SEARCH LOGIC ---
function handleSearch(val) {
    searchQuery = val.toLowerCase();
    const clearBtn = document.getElementById('clearSearch');
    clearBtn.style.display = val ? 'block' : 'none';
    renderNodes();
}

function clearSearch() {
    const input = document.getElementById('nodeSearch');
    input.value = '';
    handleSearch('');
}

// --- NOTIFICATIONS ---
function notify(msg, type = 'info') {
    const container = document.getElementById('notif-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'exclamation-triangle' : 'info-circle');
    toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'fadeOut 0.5s ease forwards';
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

// --- PARTICLE BACKGROUND ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
class Particle {
    constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4; this.size = Math.random() * 1.5; }
    update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; }
}
function initBg() { resize(); particles = Array.from({length: 50}, () => new Particle()); animateBg(); }
function animateBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.update();
        ctx.fillStyle = 'rgba(0, 210, 255, 0.15)';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        particles.forEach(p2 => {
            let d = Math.hypot(p.x - p2.x, p.y - p2.y);
            if (d < 100) { ctx.strokeStyle = `rgba(0, 210, 255, ${0.08 * (1 - d/100)})`; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
        });
    });
    requestAnimationFrame(animateBg);
}
window.addEventListener('resize', resize);
initBg();

// --- 3-SECOND BOOT ---
async function runBoot() {
    await refreshAll(false);
    setTimeout(() => {
        document.getElementById('boot-screen').style.opacity = '0';
        document.getElementById('main-content').classList.add('visible');
        setTimeout(() => {
            document.getElementById('boot-screen').remove();
            notify("Neural Interface Online", "success");
        }, 500);
    }, 3000);
}

// --- CORE LOGIC ---
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabAll').classList.toggle('active', tab === 'active');
    document.getElementById('tabOffline').classList.toggle('active', tab === 'offline');
    renderNodes();
    notify(`Filter: ${tab.toUpperCase()}`);
}

async function refreshAll(manual = false) {
    const start = Date.now();
    try {
        const [s, a] = await Promise.all([
            fetch(`${API_URL}/api/sessions`).then(r => r.json()),
            fetch(`${API_URL}/api/active`).then(r => r.json())
        ]);
        sessionData = s.sessions || []; activeNumbers = a.active || [];

        // Header always shows Global Total
        document.getElementById('pingVal').innerText = (Date.now() - start) + 'ms';
        document.getElementById('totalSessions').innerText = sessionData.length;
        document.getElementById('activeCount').innerText = activeNumbers.length;

        // Tab specific counts
        document.getElementById('countAll').innerText = activeNumbers.length;
        document.getElementById('countOffline').innerText = sessionData.length - activeNumbers.length;

        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        renderNodes();
        if(manual) notify("Neural Sync Complete", "success");
    } catch (e) { 
        if(manual) notify("Link Failed", "error");
    }
}

function renderNodes() {
    const list = document.getElementById('nodeList');

    // Filtering logic (Tab + Search)
    let filtered = sessionData;

    if (currentTab === 'active') {
        filtered = sessionData.filter(s => activeNumbers.includes(s.number));
    } else if (currentTab === 'offline') {
        filtered = sessionData.filter(s => !activeNumbers.includes(s.number));
    }

    if (searchQuery) {
        filtered = filtered.filter(s => String(s.number).toLowerCase().includes(searchQuery));
    }

    if (filtered.length === 0) { 
        list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:100px 20px;opacity:0.3;">NO NODES DETECTED IN THIS CATEGORY</div>`; 
        return; 
    }

    list.innerHTML = filtered.map((s, i) => {
        const on = activeNumbers.includes(s.number);
        return `
        <div class="node-card" style="animation-delay: ${i * 0.03}s">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="font-family:'JetBrains Mono'; font-weight:800; color:var(--accent); font-size:1.1rem;">${s.number}</div>
                <div class="status-indicator">
                    <div class="${on ? 'beep-green' : 'beep-offline'}"></div>
                    <span style="color:${on ? 'var(--success)' : 'var(--danger)'}">${on ? 'ONLINE' : 'DOWN'}</span>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn" onclick="reboot('${s.number}')">BOOT</button>
                <button class="btn btn-danger" onclick="askDelete('${s.number}')">DELETE</button>
            </div>
        </div>`;
    }).join('');
}

function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }
function showModal(title, text, onConfirm) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalText').innerText = text;
    document.getElementById('modalConfirmBtn').onclick = async () => { await onConfirm(); closeModal(); };
    document.getElementById('confirmModal').style.display = 'flex';
}

async function reboot(n) { notify(`Booting ${n}...`); await fetch(`${API_URL}/?number=${n}`); setTimeout(refreshAll, 2000); }
async function rebootOffline() {
    const off = sessionData.filter(s => !activeNumbers.includes(s.number));
    if(!off.length) return notify("All nodes online");
    notify(`Mass Boot: ${off.length} nodes`);
    for(let n of off) await fetch(`${API_URL}/?number=${n.number}`);
    setTimeout(refreshAll, 3000);
}
function askWipeOffline() {
    const off = sessionData.filter(s => !activeNumbers.includes(s.number));
    if(!off.length) return;
    showModal("DELETE OFFLINE", `Wipe ${off.length} nodes?`, async () => {
        for(let n of off) await fetch(`${API_URL}/api/session/delete`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({number:String(n.number)}) });
        notify("Offline nodes purged", "success");
        refreshAll();
    });
}
function askDelete(n) { showModal("DELETE NODE", `Wipe node ${n}?`, async () => { await fetch(`${API_URL}/api/session/delete`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({number:String(n)}) }); notify(`Node ${n} deleted`, "success"); refreshAll(); }); }
function askWipe() { showModal("PURGE ALL", "Wipe database?", async () => { await fetch(`${API_URL}/api/terminate-all`, { method:'POST' }); notify("Global Database Purged", "success"); refreshAll(); }); }
async function connectAll() { notify("Global boot initiated"); await fetch(`${API_URL}/connect-all`); setTimeout(refreshAll, 3000); }
async function reconnect() { notify("Neural Relog started"); await fetch(`${API_URL}/reconnect`); setTimeout(refreshAll, 3000); }

window.onload = runBoot;
setInterval(() => refreshAll(false), 20000);
</script>
</body>
</html>
